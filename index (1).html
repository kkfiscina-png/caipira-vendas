<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O Caipira — Painel de Vendas</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --marrom: #5C3317;
    --marrom-escuro: #3B1F0A;
    --marrom-medio: #8B5E3C;
    --amber: #C8860A;
    --amber-light: #F5E6C8;
    --bege: #F5EDD8;
    --bege2: #EDE2C8;
    --bege3: #E0D0B0;
    --surface: #FFFFFF;
    --text: #1A1206;
    --text2: #5C3D1A;
    --text3: #9A7A50;
    --border: rgba(92,51,23,0.12);
    --border2: rgba(92,51,23,0.22);
    --green: #2d6a4f;
    --blue: #1D5C8B;
    --radius: 12px;
    --radius-sm: 8px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bege: #1A1206;
      --bege2: #221808;
      --bege3: #2C1E0A;
      --surface: #251A08;
      --text: #F5EDD8;
      --text2: #C8A878;
      --text3: #8A6840;
      --border: rgba(200,134,10,0.15);
      --border2: rgba(200,134,10,0.28);
      --amber-light: #3A2005;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bege);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.5;
  }

  .header {
    background: var(--marrom-escuro);
    color: #F5EDD8;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 14px rgba(0,0,0,0.35);
    border-bottom: 2px solid var(--amber);
  }
  .header-brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-logo {
    width: 42px;
    height: 42px;
    object-fit: contain;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.4));
  }
  .header-title {
    display: flex;
    flex-direction: column;
  }
  .header-title .nome { font-size: 16px; font-weight: 700; letter-spacing: 0.04em; color: #F5EDD8; }
  .header-title .sub { font-size: 10px; color: var(--amber); letter-spacing: 0.12em; text-transform: uppercase; }

  .badge-mode {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 99px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .badge-gerente { background: var(--amber); color: var(--marrom-escuro); }
  .badge-view { background: rgba(245,237,216,0.18); color: #F5EDD8; }

  .btn-gerente {
    background: rgba(245,237,216,0.12);
    border: 1px solid rgba(245,237,216,0.3);
    color: #F5EDD8;
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-gerente:hover { background: rgba(245,237,216,0.22); }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 28px 24px;
    width: 90%;
    max-width: 340px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.3);
    border: 1px solid var(--border2);
  }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: var(--marrom); }
  .modal p { font-size: 13px; color: var(--text2); margin-bottom: 16px; }
  .modal input[type="password"] {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--border2);
    border-radius: var(--radius-sm);
    font-size: 16px;
    background: var(--bege);
    color: var(--text);
    margin-bottom: 12px;
    letter-spacing: 0.1em;
  }
  .modal input:focus { outline: none; border-color: var(--amber); }
  .modal-btns { display: flex; gap: 8px; }
  .btn-primary {
    flex: 1;
    background: var(--marrom);
    color: #F5EDD8;
    border: none;
    border-radius: var(--radius-sm);
    padding: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-primary:hover { background: var(--marrom-escuro); }
  .btn-secondary {
    background: var(--bege2);
    color: var(--text2);
    border: none;
    border-radius: var(--radius-sm);
    padding: 10px 16px;
    font-size: 14px;
    cursor: pointer;
  }
  .modal-error { font-size: 12px; color: #C0392B; margin-top: -6px; margin-bottom: 10px; display: none; }

  .container { max-width: 680px; margin: 0 auto; padding: 0 16px 40px; }

  .filtros {
    display: flex;
    gap: 10px;
    padding: 14px 0;
    flex-wrap: wrap;
    align-items: center;
  }
  .filtro-group { display: flex; flex-direction: column; gap: 3px; }
  .filtro-group label { font-size: 11px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }
  .filtro-group select {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    font-size: 14px;
    color: var(--text);
    cursor: pointer;
    min-width: 130px;
  }

  .meta-bar {
    background: var(--amber-light);
    border: 1px solid rgba(200,134,10,0.25);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .meta-bar label { font-size: 13px; color: var(--marrom); font-weight: 500; }
  .meta-bar input {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 7px 10px;
    font-size: 14px;
    color: var(--text);
    width: 120px;
  }
  .meta-bar span { font-size: 12px; color: var(--text3); }

  .lancamento-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 20px;
    border-left: 3px solid var(--amber);
  }
  .lancamento-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--marrom);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }
  @media (max-width: 480px) { .form-grid { grid-template-columns: 1fr; } }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 12px; color: var(--text2); font-weight: 500; }
  .form-group select, .form-group input {
    background: var(--bege);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    font-size: 14px;
    color: var(--text);
    width: 100%;
  }
  .btn-lancar {
    width: 100%;
    background: var(--marrom);
    color: #F5EDD8;
    border: none;
    border-radius: var(--radius-sm);
    padding: 11px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-lancar:hover { background: var(--marrom-escuro); }
  .toast {
    display: none;
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--marrom-escuro);
    color: #F5EDD8;
    padding: 10px 20px;
    border-radius: 99px;
    font-size: 13px;
    z-index: 300;
    white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    border: 1px solid var(--amber);
  }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  @media (min-width: 480px) { .summary-grid { grid-template-columns: repeat(4, 1fr); } }
  .scard {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px;
    border-top: 2px solid var(--amber);
  }
  .scard-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .scard-value { font-size: 19px; font-weight: 700; color: var(--marrom); line-height: 1.2; }
  .scard-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

  .tabs {
    display: flex;
    border-bottom: 1.5px solid var(--border);
    margin-bottom: 16px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 9px 18px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text3);
    background: transparent;
    border: none;
    border-bottom: 2.5px solid transparent;
    cursor: pointer;
    white-space: nowrap;
    margin-bottom: -1.5px;
  }
  .tab.active { color: var(--marrom); border-bottom-color: var(--amber); }
  .tab:hover:not(.active) { color: var(--text2); }
  .view { display: none; }
  .view.active { display: block; }

  .ranking-list { display: flex; flex-direction: column; gap: 10px; }
  .gcard {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .gcard.r1 { border-color: rgba(184,134,11,0.5); border-left: 3px solid #B8860B; }
  .gcard.r2 { border-color: rgba(112,128,144,0.4); border-left: 3px solid #708090; }
  .gcard.r3 { border-color: rgba(205,127,50,0.4); border-left: 3px solid #CD7F32; }
  .gcard.ausente { opacity: 0.45; }
  .gcard-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .medal {
    width: 38px; height: 38px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .m1 { background: #FFF8DC; border: 1.5px solid rgba(184,134,11,0.4); }
  .m2 { background: #F0F2F4; border: 1.5px solid rgba(112,128,144,0.3); }
  .m3 { background: #FDF4EC; border: 1.5px solid rgba(205,127,50,0.35); }
  .mn { background: var(--bege2); border: 1px solid var(--border); font-size: 14px; color: var(--text3); }
  .gcard-info { flex: 1; }
  .gcard-nome { font-size: 16px; font-weight: 700; color: var(--marrom); }
  .gcard-sub { font-size: 12px; color: var(--text3); }
  .gcard-nums { text-align: right; flex-shrink: 0; }
  .gcard-valor { font-size: 18px; font-weight: 700; color: var(--marrom); }
  .badge {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 11px; padding: 3px 9px; border-radius: 99px;
    font-weight: 600; margin-top: 3px;
  }
  .badge-ok { background: #E8F5E9; color: #2E7D32; }
  .badge-no { background: var(--bege2); color: var(--text3); }
  .badge-aus { background: #FFF3E0; color: #E65100; }

  .prog-row { display: flex; align-items: center; gap: 10px; }
  .prog-label { font-size: 12px; color: var(--text2); width: 90px; flex-shrink: 0; }
  .prog-track {
    flex: 1; height: 9px; background: var(--bege2);
    border-radius: 99px; overflow: hidden;
  }
  .prog-fill { height: 100%; border-radius: 99px; transition: width 0.6s cubic-bezier(.4,0,.2,1); }
  .prog-pct { font-size: 12px; color: var(--text2); width: 40px; text-align: right; flex-shrink: 0; }

  .chart-header { font-size: 12px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 10px; }
  .legend { display: flex; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text2); }
  .legend-dot { width: 11px; height: 11px; border-radius: 2px; }
  .chart-container { position: relative; width: 100%; height: 240px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; }

  .mes-bloco { margin-bottom: 20px; }
  .mes-titulo {
    font-size: 13px; font-weight: 600; color: var(--marrom);
    text-transform: uppercase; letter-spacing: 0.07em;
    padding-bottom: 8px; margin-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .mes-garcons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .mgc { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; }
  .mgc-nome { font-size: 12px; color: var(--text3); margin-bottom: 2px; }
  .mgc-val { font-size: 16px; font-weight: 700; color: var(--marrom); }
  .mgc-rank { font-size: 11px; margin-top: 3px; }

  .historico-list { display: flex; flex-direction: column; gap: 6px; }
  .hist-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
  }
  .hist-info { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .hist-tag {
    background: var(--bege2); border-radius: 99px;
    padding: 2px 10px; font-size: 12px; color: var(--text2);
  }
  .hist-garcom { font-weight: 600; color: var(--marrom); }
  .hist-val { font-weight: 700; color: var(--amber); }
  .btn-del {
    background: none; border: none; color: var(--text3);
    cursor: pointer; font-size: 16px; padding: 2px 6px;
    border-radius: 4px;
  }
  .btn-del:hover { background: #FEE; color: #C0392B; }
</style>
</head>

      </div>
      <div class="form-group">
        <label>Valor vendido (R$)</label>
        <input type="number" id="fValor" placeholder="Ex: 4500.00" step="0.01" min="0">
      </div>
    </div>
    <button class="btn-lancar" onclick="lancar()">➕ Registrar venda</button>
  </div>

  <div class="summary-grid" id="summaryCards"></div>

  <div class="tabs">
    <button class="tab active" onclick="setTab('ranking',this)">🏆 Ranking</button>
    <button class="tab" onclick="setTab('evolucao',this)">📈 Evolução mensal</button>
    <button class="tab" onclick="setTab('acumulado',this)">📊 Acumulado</button>
    <button class="tab" id="tabHistorico" style="display:none" onclick="setTab('historico',this)">🗂 Histórico</button>
  </div>

  <div id="view-ranking" class="view active">
    <div class="ranking-list" id="rankingList"></div>
  </div>
  <div id="view-evolucao" class="view">
    <div class="chart-header" id="evolTitulo"></div>
    <div class="legend" id="evolLegend"></div>
    <div class="chart-container">
      <canvas id="evolChart" role="img" aria-label="Evolução de vendas por semana.">Evolução semanal.</canvas>
    </div>
  </div>
  <div id="view-acumulado" class="view">
    <div id="acumConteudo"></div>
  </div>
  <div id="view-historico" class="view">
    <div class="historico-list" id="historicoList"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const DADOS_INICIAIS = [
  {mes:'Janeiro',sem:1,garcom:'Sebastian',val:6292.92},{mes:'Janeiro',sem:1,garcom:'Mário',val:3221.49},{mes:'Janeiro',sem:1,garcom:'Larissa',val:3371.88},
  {mes:'Janeiro',sem:2,garcom:'Sebastian',val:6098.41},{mes:'Janeiro',sem:2,garcom:'Mário',val:5392.26},{mes:'Janeiro',sem:2,garcom:'Larissa',val:5510.37},
  {mes:'Janeiro',sem:3,garcom:'Sebastian',val:8637.15},{mes:'Janeiro',sem:3,garcom:'Mário',val:2315.52},{mes:'Janeiro',sem:3,garcom:'Larissa',val:5963.63},
  {mes:'Janeiro',sem:4,garcom:'Sebastian',val:3394.86},{mes:'Janeiro',sem:4,garcom:'Mário',val:2731.57},{mes:'Janeiro',sem:4,garcom:'Larissa',val:4405.47},
  {mes:'Fevereiro',sem:1,garcom:'Sebastian',val:1677.50},{mes:'Fevereiro',sem:1,garcom:'Mário',val:6535.13},{mes:'Fevereiro',sem:1,garcom:'Larissa',val:5311.39},
  {mes:'Fevereiro',sem:2,garcom:'Sebastian',val:null},{mes:'Fevereiro',sem:2,garcom:'Mário',val:4769.24},{mes:'Fevereiro',sem:2,garcom:'Larissa',val:5516.36},
  {mes:'Fevereiro',sem:3,garcom:'Sebastian',val:null},{mes:'Fevereiro',sem:3,garcom:'Mário',val:5087.42},{mes:'Fevereiro',sem:3,garcom:'Larissa',val:5172.75},
  {mes:'Fevereiro',sem:4,garcom:'Sebastian',val:null},{mes:'Fevereiro',sem:4,garcom:'Mário',val:2734.99},{mes:'Fevereiro',sem:4,garcom:'Larissa',val:2386.49},
  {mes:'Março',sem:1,garcom:'Sebastian',val:2970.70},{mes:'Março',sem:1,garcom:'Mário',val:5410.46},{mes:'Março',sem:1,garcom:'Larissa',val:6308.54},
  {mes:'Março',sem:2,garcom:'Sebastian',val:7125.62},{mes:'Março',sem:2,garcom:'Mário',val:2972.77},{mes:'Março',sem:2,garcom:'Larissa',val:4730.15},
  {mes:'Março',sem:3,garcom:'Sebastian',val:5361.46},{mes:'Março',sem:3,garcom:'Mário',val:2312.70},{mes:'Março',sem:3,garcom:'Larissa',val:5042.97},
  {mes:'Março',sem:4,garcom:'Sebastian',val:4723.40},{mes:'Março',sem:4,garcom:'Mário',val:1394.10},{mes:'Março',sem:4,garcom:'Larissa',val:6140.00},
  {mes:'Abril',sem:1,garcom:'Sebastian',val:5933.04},{mes:'Abril',sem:1,garcom:'Mário',val:3407.40},{mes:'Abril',sem:1,garcom:'Larissa',val:5238.77},
  {mes:'Abril',sem:2,garcom:'Sebastian',val:5262.01},{mes:'Abril',sem:2,garcom:'Mário',val:2779.65},{mes:'Abril',sem:2,garcom:'Larissa',val:1539.31},
  {mes:'Abril',sem:3,garcom:'Sebastian',val:7175.73},{mes:'Abril',sem:3,garcom:'Mário',val:3165.70},{mes:'Abril',sem:3,garcom:'Larissa',val:4165.20},
  {mes:'Abril',sem:4,garcom:'Sebastian',val:7788.10},{mes:'Abril',sem:4,garcom:'Mário',val:623.54},{mes:'Abril',sem:4,garcom:'Larissa',val:3201.87},
];

const SENHA = 'caipira2025';
const GARCONS = ['Sebastian','Mário','Larissa'];
const CORES = { 'Sebastian':'#C8860A', 'Mário':'#1D5C8B', 'Larissa':'#2d6a4f' };
const MESES_ORDEM = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

let modoGerente = false;
let currentTab = 'ranking';
let evolChart = null;

function getData() {
  try { const s = localStorage.getItem('caipira_dados'); return s ? JSON.parse(s) : [...DADOS_INICIAIS]; } catch(e) { return [...DADOS_INICIAIS]; }
}
function saveData(d) { try { localStorage.setItem('caipira_dados', JSON.stringify(d)); } catch(e) {} }

function toggleGerente() {
  if (modoGerente) { modoGerente = false; atualizarModoUI(); }
  else {
    document.getElementById('modalSenha').classList.add('open');
    document.getElementById('inputSenha').value = '';
    document.getElementById('erroSenha').style.display = 'none';
    setTimeout(() => document.getElementById('inputSenha').focus(), 100);
  }
}
function fecharModal() { document.getElementById('modalSenha').classList.remove('open'); }
function confirmarSenha() {
  const s = document.getElementById('inputSenha').value;
  if (s === SENHA) { modoGerente = true; fecharModal(); atualizarModoUI(); showToast('✅ Modo gerente ativado'); }
  else { document.getElementById('erroSenha').style.display = 'block'; document.getElementById('inputSenha').value = ''; document.getElementById('inputSenha').focus(); }
}
function atualizarModoUI() {
  const badge = document.getElementById('badgeMode');
  const btnLabel = document.getElementById('btnGerenteLabel');
  if (modoGerente) {
    badge.textContent = 'Gerente'; badge.className = 'badge-mode badge-gerente';
    btnLabel.textContent = '🔓 Sair';
    document.getElementById('metaBar').style.display = 'flex';
    document.getElementById('lancamentoCard').style.display = 'block';
    document.getElementById('tabHistorico').style.display = 'inline-block';
  } else {
    badge.textContent = 'Visualização'; badge.className = 'badge-mode badge-view';
    btnLabel.textContent = '🔐 Gerente';
    document.getElementById('metaBar').style.display = 'none';
    document.getElementById('lancamentoCard').style.display = 'none';
    document.getElementById('tabHistorico').style.display = 'none';
    if (currentTab === 'historico') setTabById('ranking');
  }
  renderAll();
}

function getMeses() {
  const data = getData();
  const set = [...new Set(data.filter(r => r.val !== null).map(r => r.mes))];
  return MESES_ORDEM.filter(m => set.includes(m));
}
function populateFilters() {
  const meses = getMeses();
  const ms = document.getElementById('selMes');
  ms.innerHTML = meses.map(m => `<option value="${m}">${m}</option>`).join('');
  ms.value = meses[meses.length - 1];
  updateSemanas();
}
function updateSemanas() {
  const mes = document.getElementById('selMes').value;
  const data = getData();
  const sems = [...new Set(data.filter(r => r.mes === mes).map(r => r.sem))].sort((a,b)=>a-b);
  const ss = document.getElementById('selSem');
  ss.innerHTML = sems.map(s => `<option value="${s}">Semana ${s}</option>`).join('');
  ss.value = sems[sems.length - 1];
}
function onMesChange() { updateSemanas(); renderAll(); }

function lancar() {
  const mes = document.getElementById('fMes').value;
  const sem = parseInt(document.getElementById('fSem').value);
  const garcom = document.getElementById('fGarcom').value;
  const valStr = document.getElementById('fValor').value;
  if (!valStr || isNaN(parseFloat(valStr))) { showToast('⚠️ Digite um valor válido.'); return; }
  const val = parseFloat(valStr);
  const data = getData();
  const idx = data.findIndex(r => r.mes === mes && r.sem === sem && r.garcom === garcom);
  if (idx >= 0) { data[idx].val = val; } else { data.push({mes, sem, garcom, val}); }
  saveData(data);
  document.getElementById('fValor').value = '';
  showToast(`✅ ${garcom} — ${mes} Sem.${sem}: R$ ${fmt(val)} registrado!`);
  populateFilters();
  renderAll();
}

function fmt(v) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  return 'R$ ' + Number(v).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function getVal(data, mes, sem, garcom) {
  const r = data.find(x => x.mes === mes && x.sem === sem && x.garcom === garcom);
  return r ? r.val : null;
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2800);
}

function renderSummary(data, mes, sem) {
  const rows = GARCONS.map(g => ({ garcom: g, val: getVal(data, mes, sem, g) })).filter(r => r.val !== null);
  const total = rows.reduce((s,r) => s+r.val, 0);
  const lider = [...rows].sort((a,b)=>b.val-a.val)[0];
  const meta = parseFloat(document.getElementById('metaVal').value) || 5000;
  const bateram = rows.filter(r => r.val >= meta).length;
  document.getElementById('summaryCards').innerHTML = `
    <div class="scard"><div class="scard-label">Total da semana</div><div class="scard-value" style="font-size:15px">${fmt(total)}</div><div class="scard-sub">${mes} · Sem. ${sem}</div></div>
    <div class="scard"><div class="scard-label">Média por garçom</div><div class="scard-value" style="font-size:15px">${rows.length ? fmt(Math.round(total/rows.length)) : '—'}</div><div class="scard-sub">${rows.length} ativo(s)</div></div>
    <div class="scard"><div class="scard-label">Líder da semana</div><div class="scard-value" style="font-size:14px">${lider ? lider.garcom : '—'}</div><div class="scard-sub">${lider ? fmt(lider.val) : ''}</div></div>
    <div class="scard"><div class="scard-label">Bateram a meta</div><div class="scard-value">${bateram}/${rows.length}</div><div class="scard-sub">meta ${fmt(meta)}</div></div>
  `;
}

function renderRanking(data, mes, sem) {
  const meta = parseFloat(document.getElementById('metaVal').value) || 5000;
  const dados = GARCONS.map(g => ({ garcom: g, val: getVal(data, mes, sem, g) }))
    .sort((a,b) => { if (a.val===null&&b.val===null) return 0; if (a.val===null) return 1; if (b.val===null) return -1; return b.val-a.val; });
  const emojis = ['🥇','🥈','🥉'];
  const rclass = ['r1','r2','r3'];
  const mclass = ['m1','m2','m3'];
  let rank = 0;
  document.getElementById('rankingList').innerHTML = dados.map(d => {
    const ausente = d.val === null;
    if (!ausente) rank++;
    const ri = rank - 1;
    const pct = ausente ? 0 : Math.min(100, Math.round(d.val/meta*100));
    const bateu = !ausente && d.val >= meta;
    const cardClass = ausente ? 'ausente' : (ri < 3 ? rclass[ri] : '');
    const mc = ausente ? 'mn' : (ri < 3 ? mclass[ri] : 'mn');
    const me = ausente ? '—' : (ri < 3 ? emojis[ri] : String(rank));
    return `<div class="gcard ${cardClass}">
      <div class="gcard-top">
        <div class="medal ${mc}">${me}</div>
        <div class="gcard-info">
          <div class="gcard-nome">${d.garcom}</div>
          <div class="gcard-sub">${ausente ? 'Sem registro nessa semana' : mes+' · Sem. '+sem}</div>
        </div>
        <div class="gcard-nums">
          <div class="gcard-valor">${ausente ? '—' : fmt(d.val)}</div>
          ${ausente ? '<span class="badge badge-aus">⚠️ Ausente</span>' : bateu ? '<span class="badge badge-ok">✅ Meta ok</span>' : `<span class="badge badge-no">${pct}% da meta</span>`}
        </div>
      </div>
      ${ausente ? '' : `<div class="prog-row">
        <span class="prog-label">Meta semanal</span>
        <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${CORES[d.garcom]}"></div></div>
        <span class="prog-pct">${pct}%</span>
      </div>`}
    </div>`;
  }).join('');
}

function renderEvolucao(data, mes) {
  const sems = [...new Set(data.filter(r => r.mes === mes).map(r => r.sem))].sort((a,b)=>a-b);
  const meta = parseFloat(document.getElementById('metaVal').value) || 5000;
  document.getElementById('evolTitulo').textContent = 'Evolução de vendas — ' + mes;
  document.getElementById('evolLegend').innerHTML =
    GARCONS.map(g => `<div class="legend-item"><div class="legend-dot" style="background:${CORES[g]}"></div>${g}</div>`).join('') +
    `<div class="legend-item"><div class="legend-dot" style="background:#ccc;border:1px dashed #999"></div>Meta</div>`;
  const datasets = GARCONS.map(g => ({
    label: g, data: sems.map(s => getVal(data, mes, s, g)),
    backgroundColor: CORES[g] + 'CC', borderColor: CORES[g],
    borderWidth: 1.5, borderRadius: 5, spanGaps: false,
  }));
  datasets.push({ label: 'Meta', data: sems.map(() => meta), type: 'line', borderColor: '#999', borderDash: [5,4], borderWidth: 1.5, pointRadius: 0, fill: false });
  if (evolChart) evolChart.destroy();
  evolChart = new Chart(document.getElementById('evolChart'), {
    type: 'bar', data: { labels: sems.map(s => 'Sem. '+s), datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ' '+ctx.dataset.label+': '+fmt(ctx.parsed.y) } } },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 12 } } },
        y: { grid: { color: 'rgba(128,128,128,0.1)' }, ticks: { callback: v => 'R$ '+(v/1000).toFixed(0)+'k', font: { size: 11 } } }
      }
    }
  });
}

function renderAcumulado(data) {
  const meses = getMeses();
  document.getElementById('acumConteudo').innerHTML = meses.map(mes => {
    const sems = [...new Set(data.filter(r => r.mes === mes).map(r => r.sem))];
    const totais = GARCONS.map(g => ({ garcom: g, val: sems.reduce((s,sem) => s+(getVal(data,mes,sem,g)||0), 0) }))
      .sort((a,b)=>b.val-a.val);
    return `<div class="mes-bloco">
      <div class="mes-titulo">${mes}</div>
      <div class="mes-garcons">
        ${totais.map((t,i) => `<div class="mgc"><div class="mgc-nome">${t.garcom}</div><div class="mgc-val">${fmt(t.val)}</div><div class="mgc-rank">${['🥇','🥈','🥉'][i]||''}</div></div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function renderHistorico(data) {
  const ativos = data.filter(r => r.val !== null).sort((a,b) => {
    const mi = r => MESES_ORDEM.indexOf(r.mes)*10+r.sem;
    return mi(b) - mi(a);
  });
  if (!ativos.length) { document.getElementById('historicoList').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text3)">Nenhum registro ainda.</div>'; return; }
  document.getElementById('historicoList').innerHTML = ativos.map(r => `
    <div class="hist-item">
      <div class="hist-info">
        <span class="hist-tag">${r.mes} · Sem. ${r.sem}</span>
        <span class="hist-garcom">${r.garcom}</span>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <span class="hist-val">${fmt(r.val)}</span>
        ${modoGerente ? `<button class="btn-del" onclick="deletar('${r.mes}',${r.sem},'${r.garcom}')">✕</button>` : ''}
      </div>
    </div>`).join('');
}
function deletar(mes, sem, garcom) {
  if (!confirm(`Remover ${garcom} — ${mes} Sem.${sem}?`)) return;
  const data = getData();
  const idx = data.findIndex(r => r.mes===mes && r.sem===sem && r.garcom===garcom);
  if (idx >= 0) { data[idx].val = null; saveData(data); renderAll(); showToast('🗑 Registro removido.'); }
}

function setTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-'+tab).classList.add('active');
  const data = getData();
  const mes = document.getElementById('selMes').value;
  if (tab==='evolucao') renderEvolucao(data, mes);
  if (tab==='acumulado') renderAcumulado(data);
  if (tab==='historico') renderHistorico(data);
}
function setTabById(tab) {
  const btn = document.querySelector(`.tab[onclick*="${tab}"]`);
  if (btn) setTab(tab, btn);
}

function renderAll() {
  const data = getData();
  const mes = document.getElementById('selMes').value;
  const sem = parseInt(document.getElementById('selSem').value);
  renderSummary(data, mes, sem);
  renderRanking(data, mes, sem);
  if (currentTab==='evolucao') renderEvolucao(data, mes);
  if (currentTab==='acumulado') renderAcumulado(data);
  if (currentTab==='historico') renderHistorico(data);
}

if (!localStorage.getItem('caipira_dados')) saveData(DADOS_INICIAIS);
populateFilters();
renderAll();
</script>
</body>
</html>
