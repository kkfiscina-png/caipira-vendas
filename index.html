<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O Caipira — Painel de Vendas</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --wine: #8B0000;
    --wine-dark: #5C0000;
    --wine-soft: #F5E6E6;
    --gold: #B8860B;
    --silver: #708090;
    --bronze: #CD7F32;
    --bg: #FAF9F7;
    --bg2: #F2F0EC;
    --bg3: #E8E5DF;
    --surface: #FFFFFF;
    --text: #1A1A1A;
    --text2: #555550;
    --text3: #999990;
    --border: rgba(0,0,0,0.10);
    --border2: rgba(0,0,0,0.18);
    --green: #2d6a4f;
    --blue: #1D6A8B;
    --radius: 12px;
    --radius-sm: 8px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1A1715;
      --bg2: #221F1C;
      --bg3: #2C2925;
      --surface: #2A2623;
      --text: #F0EDE8;
      --text2: #B0ADA8;
      --text3: #706D68;
      --border: rgba(255,255,255,0.10);
      --border2: rgba(255,255,255,0.18);
      --wine-soft: #3A1010;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.5;
  }

  /* HEADER */
  .header {
    background: var(--wine);
    color: #fff;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  .header-brand { font-size: 17px; font-weight: 600; letter-spacing: 0.01em; }
  .header-brand span { opacity: 0.7; font-weight: 400; font-size: 13px; margin-left: 6px; }
  .btn-gerente {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-gerente:hover { background: rgba(255,255,255,0.25); }
  .badge-mode {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 99px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .badge-gerente { background: #FFD700; color: #5C0000; }
  .badge-view { background: rgba(255,255,255,0.2); color: #fff; }

  /* MODAL SENHA */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 28px 24px;
    width: 90%;
    max-width: 340px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.25);
  }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .modal p { font-size: 13px; color: var(--text2); margin-bottom: 16px; }
  .modal input[type="password"] {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--border2);
    border-radius: var(--radius-sm);
    font-size: 16px;
    background: var(--bg);
    color: var(--text);
    margin-bottom: 12px;
    letter-spacing: 0.1em;
  }
  .modal input:focus { outline: none; border-color: var(--wine); }
  .modal-btns { display: flex; gap: 8px; }
  .btn-primary {
    flex: 1;
    background: var(--wine);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-primary:hover { background: var(--wine-dark); }
  .btn-secondary {
    background: var(--bg2);
    color: var(--text2);
    border: none;
    border-radius: var(--radius-sm);
    padding: 10px 16px;
    font-size: 14px;
    cursor: pointer;
  }
  .modal-error { font-size: 12px; color: #C0392B; margin-top: -6px; margin-bottom: 10px; display: none; }

  /* CONTAINER */
  .container { max-width: 680px; margin: 0 auto; padding: 0 16px 40px; }

  /* FILTROS */
  .filtros {
    display: flex;
    gap: 10px;
    padding: 14px 0;
    flex-wrap: wrap;
    align-items: center;
  }
  .filtro-group { display: flex; flex-direction: column; gap: 3px; }
  .filtro-group label { font-size: 11px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }
  .filtro-group select {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    font-size: 14px;
    color: var(--text);
    cursor: pointer;
    min-width: 130px;
  }

  /* META — só visível para gerente */
  .meta-bar {
    background: var(--wine-soft);
    border: 1px solid rgba(139,0,0,0.15);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .meta-bar label { font-size: 13px; color: var(--wine-dark, #5C0000); font-weight: 500; }
  .meta-bar input {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 7px 10px;
    font-size: 14px;
    color: var(--text);
    width: 120px;
  }
  .meta-bar span { font-size: 12px; color: var(--text3); }

  /* LANÇAMENTO — só visível para gerente */
  .lancamento-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 20px;
  }
  .lancamento-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--wine);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }
  @media (max-width: 480px) { .form-grid { grid-template-columns: 1fr; } }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 12px; color: var(--text2); font-weight: 500; }
  .form-group select, .form-group input {
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    font-size: 14px;
    color: var(--text);
    width: 100%;
  }
  .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--wine); }
  .btn-lancar {
    width: 100%;
    background: var(--wine);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 11px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-lancar:hover { background: var(--wine-dark); }
  .toast {
    display: none;
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #1A1A1A;
    color: #fff;
    padding: 10px 20px;
    border-radius: 99px;
    font-size: 13px;
    z-index: 300;
    white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }

  /* CARDS RESUMO */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  @media (min-width: 480px) { .summary-grid { grid-template-columns: repeat(4, 1fr); } }
  .scard {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px;
  }
  .scard-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .scard-value { font-size: 20px; font-weight: 600; color: var(--text); line-height: 1.2; }
  .scard-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* TABS */
  .tabs {
    display: flex;
    border-bottom: 1.5px solid var(--border);
    margin-bottom: 16px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 9px 18px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text3);
    background: transparent;
    border: none;
    border-bottom: 2.5px solid transparent;
    cursor: pointer;
    white-space: nowrap;
    margin-bottom: -1.5px;
  }
  .tab.active { color: var(--wine); border-bottom-color: var(--wine); }
  .tab:hover:not(.active) { color: var(--text2); }
  .view { display: none; }
  .view.active { display: block; }

  /* RANKING */
  .ranking-list { display: flex; flex-direction: column; gap: 10px; }
  .gcard {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    transition: border-color 0.15s;
  }
  .gcard.r1 { border-color: rgba(184,134,11,0.5); }
  .gcard.r2 { border-color: rgba(112,128,144,0.4); }
  .gcard.r3 { border-color: rgba(205,127,50,0.4); }
  .gcard.ausente { opacity: 0.45; }
  .gcard-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .medal {
    width: 38px; height: 38px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0; font-weight: 600;
  }
  .m1 { background: #FFF8DC; border: 1.5px solid rgba(184,134,11,0.4); }
  .m2 { background: #F0F2F4; border: 1.5px solid rgba(112,128,144,0.3); }
  .m3 { background: #FDF4EC; border: 1.5px solid rgba(205,127,50,0.35); }
  .mn { background: var(--bg2); border: 1px solid var(--border); font-size: 14px; color: var(--text3); }
  .gcard-info { flex: 1; }
  .gcard-nome { font-size: 16px; font-weight: 600; color: var(--text); }
  .gcard-sub { font-size: 12px; color: var(--text3); }
  .gcard-nums { text-align: right; flex-shrink: 0; }
  .gcard-valor { font-size: 18px; font-weight: 700; color: var(--text); }
  .badge {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 11px; padding: 3px 9px; border-radius: 99px;
    font-weight: 600; margin-top: 3px;
  }
  .badge-ok { background: #E8F5E9; color: #2E7D32; }
  .badge-no { background: var(--bg2); color: var(--text3); }
  .badge-aus { background: #FFF3E0; color: #E65100; }
  .prog-row { display: flex; align-items: center; gap: 10px; }
  .prog-label { font-size: 12px; color: var(--text2); width: 90px; flex-shrink: 0; }
  .prog-track {
    flex: 1; height: 9px; background: var(--bg2);
    border-radius: 99px; overflow: hidden;
  }
  .prog-fill { height: 100%; border-radius: 99px; transition: width 0.6s cubic-bezier(.4,0,.2,1); }
  .prog-pct { font-size: 12px; color: var(--text2); width: 40px; text-align: right; flex-shrink: 0; }

  /* EVOLUÇÃO */
  .chart-header { font-size: 12px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 10px; }
  .legend { display: flex; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text2); }
  .legend-dot { width: 11px; height: 11px; border-radius: 2px; }
  .chart-container { position: relative; width: 100%; height: 240px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; }

  /* ACUMULADO */
  .mes-bloco { margin-bottom: 20px; }
  .mes-titulo {
    font-size: 13px; font-weight: 600; color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.07em;
    padding-bottom: 8px; margin-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .mes-garcons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .mgc { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; }
  .mgc-nome { font-size: 12px; color: var(--text3); margin-bottom: 2px; }
  .mgc-val { font-size: 16px; font-weight: 700; color: var(--text); }
  .mgc-rank { font-size: 11px; margin-top: 3px; }

  /* HISTÓRICO — gerente */
  .historico-list { display: flex; flex-direction: column; gap: 6px; }
  .hist-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
  }
  .hist-info { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .hist-tag {
    background: var(--bg2); border-radius: 99px;
    padding: 2px 10px; font-size: 12px; color: var(--text2);
  }
  .hist-garcom { font-weight: 600; }
  .hist-val { font-weight: 700; color: var(--wine); }
  .btn-del {
    background: none; border: none; color: var(--text3);
    cursor: pointer; font-size: 16px; padding: 2px 6px;
    border-radius: 4px;
  }
  .btn-del:hover { background: #FEE; color: #C0392B; }

  .empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; }
  .empty-icon { font-size: 36px; margin-bottom: 10px; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-brand">
    O Caipira
    <span id="badgeMode" class="badge-mode badge-view">Visualização</span>
  </div>
  <button class="btn-gerente" id="btnGerente" onclick="toggleGerente()">
    <span id="btnGerenteLabel">🔐 Gerente</span>
  </button>
</div>

<!-- MODAL SENHA -->
<div class="modal-overlay" id="modalSenha">
  <div class="modal">
    <h2>Acesso Gerente</h2>
    <p>Digite a senha para habilitar o lançamento de dados.</p>
    <input type="password" id="inputSenha" placeholder="••••••••" onkeydown="if(event.key==='Enter')confirmarSenha()">
    <div class="modal-error" id="erroSenha">Senha incorreta. Tente novamente.</div>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="fecharModal()">Cancelar</button>
      <button class="btn-primary" onclick="confirmarSenha()">Entrar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- CONTEÚDO PRINCIPAL -->
<div class="container">

  <!-- FILTROS -->
  <div class="filtros">
    <div class="filtro-group">
      <label>Mês</label>
      <select id="selMes" onchange="onMesChange()"></select>
    </div>
    <div class="filtro-group">
      <label>Semana</label>
      <select id="selSem" onchange="renderAll()"></select>
    </div>
  </div>

  <!-- META (só gerente) -->
  <div class="meta-bar gerente-only" id="metaBar" style="display:none">
    <label>Meta semanal (R$):</label>
    <input type="number" id="metaVal" value="5000" step="500" onchange="renderAll()">
    <span>Ajuste a meta e o painel atualiza automaticamente.</span>
  </div>

  <!-- LANÇAMENTO (só gerente) -->
  <div class="lancamento-card gerente-only" id="lancamentoCard" style="display:none">
    <div class="lancamento-title">
      ✏️ Lançar vendas
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label>Mês</label>
        <select id="fMes">
          <option>Janeiro</option><option>Fevereiro</option><option>Março</option>
          <option>Abril</option><option>Maio</option><option>Junho</option>
          <option>Julho</option><option>Agosto</option><option>Setembro</option>
          <option>Outubro</option><option>Novembro</option><option>Dezembro</option>
        </select>
      </div>
      <div class="form-group">
        <label>Semana</label>
        <select id="fSem">
          <option value="1">Semana 1</option><option value="2">Semana 2</option>
          <option value="3">Semana 3</option><option value="4">Semana 4</option>
          <option value="5">Semana 5</option>
        </select>
      </div>
      <div class="form-group">
        <label>Garçom</label>
        <select id="fGarcom">
          <option>Sebastian</option><option>Mário</option><option>Larissa</option>
        </select>
      </div>
      <div class="form-group">
        <label>Valor vendido (R$)</label>
        <input type="number" id="fValor" placeholder="Ex: 4500.00" step="0.01" min="0">
      </div>
    </div>
    <button class="btn-lancar" onclick="lancar()">
      ➕ Registrar venda
    </button>
  </div>

  <!-- CARDS RESUMO -->
  <div class="summary-grid" id="summaryCards"></div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="setTab('ranking',this)">🏆 Ranking</button>
    <button class="tab" onclick="setTab('evolucao',this)">📈 Evolução mensal</button>
    <button class="tab" onclick="setTab('acumulado',this)">📊 Acumulado</button>
    <button class="tab gerente-only" id="tabHistorico" style="display:none" onclick="setTab('historico',this)">🗂 Histórico</button>
  </div>

  <div id="view-ranking" class="view active">
    <div class="ranking-list" id="rankingList"></div>
  </div>
  <div id="view-evolucao" class="view">
    <div class="chart-header" id="evolTitulo"></div>
    <div class="legend" id="evolLegend"></div>
    <div class="chart-container">
      <canvas id="evolChart" role="img" aria-label="Evolução de vendas por semana.">Evolução semanal.</canvas>
    </div>
  </div>
  <div id="view-acumulado" class="view">
    <div id="acumConteudo"></div>
  </div>
  <div id="view-historico" class="view">
    <div class="historico-list" id="historicoList"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

  {mes:'Abril',sem:3,garcom:'Sebastian',val:7175.73},
  {mes:'Abril',sem:3,garcom:'Mário',val:3165.70},
  {mes:'Abril',sem:3,garcom:'Larissa',val:4165.20},
  {mes:'Abril',sem:4,garcom:'Sebastian',val:7788.10},
  {mes:'Abril',sem:4,garcom:'Mário',val:623.54},
  {mes:'Abril',sem:4,garcom:'Larissa',val:3201.87},
];

// ─── ESTADO ────────────────────────────────────────────────────────
const SENHA = 'caipira2025';
const GARCONS = ['Sebastian','Mário','Larissa'];
const CORES = { 'Sebastian':'#8B0000', 'Mário':'#1D6A8B', 'Larissa':'#2d6a4f' };
const MESES_ORDEM = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

let modoGerente = false;
let currentTab = 'ranking';
let evolChart = null;

function getData() {
  try {
    const s = localStorage.getItem('caipira_dados');
    return s ? JSON.parse(s) : [...DADOS_INICIAIS];
  } catch(e) { return [...DADOS_INICIAIS]; }
}
function saveData(d) {
  try { localStorage.setItem('caipira_dados', JSON.stringify(d)); } catch(e) {}
}

// ─── AUTH ───────────────────────────────────────────────────────────
function toggleGerente() {
  if (modoGerente) {
    modoGerente = false;
    atualizarModoUI();
  } else {
    document.getElementById('modalSenha').classList.add('open');
    document.getElementById('inputSenha').value = '';
    document.getElementById('erroSenha').style.display = 'none';
    setTimeout(() => document.getElementById('inputSenha').focus(), 100);
  }
}
function fecharModal() {
  document.getElementById('modalSenha').classList.remove('open');
}
function confirmarSenha() {
  const s = document.getElementById('inputSenha').value;
  if (s === SENHA) {
    modoGerente = true;
    fecharModal();
    atualizarModoUI();
    showToast('✅ Modo gerente ativado');
  } else {
    document.getElementById('erroSenha').style.display = 'block';
    document.getElementById('inputSenha').value = '';
    document.getElementById('inputSenha').focus();
  }
}
function atualizarModoUI() {
  const badge = document.getElementById('badgeMode');
  const btnLabel = document.getElementById('btnGerenteLabel');
  if (modoGerente) {
    badge.textContent = 'Gerente';
    badge.className = 'badge-mode badge-gerente';
    btnLabel.textContent = '🔓 Sair';
    document.getElementById('metaBar').style.display = 'flex';
    document.getElementById('lancamentoCard').style.display = 'block';
    document.getElementById('tabHistorico').style.display = 'inline-block';
  } else {
    badge.textContent = 'Visualização';
    badge.className = 'badge-mode badge-view';
    btnLabel.textContent = '🔐 Gerente';
    document.getElementById('metaBar').style.display = 'none';
    document.getElementById('lancamentoCard').style.display = 'none';
    document.getElementById('tabHistorico').style.display = 'none';
    if (currentTab === 'historico') setTabById('ranking');
  }
  renderAll();
}

// ─── FILTROS ────────────────────────────────────────────────────────
function getMeses() {
  const data = getData();
  const set = [...new Set(data.filter(r => r.val !== null).map(r => r.mes))];
  return MESES_ORDEM.filter(m => set.includes(m));
}
function populateFilters() {
  const meses = getMeses();
  const ms = document.getElementById('selMes');
  ms.innerHTML = meses.map(m => `<option value="${m}">${m}</option>`).join('');
  ms.value = meses[meses.length - 1];
  updateSemanas();
}
function updateSemanas() {
  const mes = document.getElementById('selMes').value;
  const data = getData();
  const sems = [...new Set(data.filter(r => r.mes === mes).map(r => r.sem))].sort((a,b)=>a-b);
  const ss = document.getElementById('selSem');
  ss.innerHTML = sems.map(s => `<option value="${s}">Semana ${s}</option>`).join('');
  ss.value = sems[sems.length - 1];
}
function onMesChange() { updateSemanas(); renderAll(); }

// ─── LANÇAMENTO ─────────────────────────────────────────────────────
function lancar() {
  const mes = document.getElementById('fMes').value;
  const sem = parseInt(document.getElementById('fSem').value);
  const garcom = document.getElementById('fGarcom').value;
  const valStr = document.getElementById('fValor').value;
  if (!valStr || isNaN(parseFloat(valStr))) { showToast('⚠️ Digite um valor válido.'); return; }
  const val = parseFloat(valStr);
  const data = getData();
  const idx = data.findIndex(r => r.mes === mes && r.sem === sem && r.garcom === garcom);
  if (idx >= 0) { data[idx].val = val; } else { data.push({mes, sem, garcom, val}); }
  saveData(data);
  document.getElementById('fValor').value = '';
  showToast(`✅ ${garcom} — ${mes} Sem.${sem}: R$ ${fmt(val)} registrado!`);
  populateFilters();
  renderAll();
}

// ─── UTILS ─────────────────────────────────────────────────────────
function fmt(v) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  return 'R$ ' + Number(v).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtK(v) {
  if (!v) return 'R$ 0';
  return 'R$ ' + (v/1000).toFixed(1) + 'k';
}
function getVal(data, mes, sem, garcom) {
  const r = data.find(x => x.mes === mes && x.sem === sem && x.garcom === garcom);
  return r ? r.val : null;
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2800);
}

// ─── RENDER SUMMARY ─────────────────────────────────────────────────
function renderSummary(data, mes, sem) {
  const rows = GARCONS.map(g => ({ garcom: g, val: getVal(data, mes, sem, g) })).filter(r => r.val !== null);
  const total = rows.reduce((s,r) => s+r.val, 0);
  const lider = [...rows].sort((a,b)=>b.val-a.val)[0];
  const meta = parseFloat(document.getElementById('metaVal').value) || 5000;
  const bateram = rows.filter(r => r.val >= meta).length;
  document.getElementById('summaryCards').innerHTML = `
    <div class="scard"><div class="scard-label">Total da semana</div><div class="scard-value" style="font-size:16px">${fmt(total)}</div><div class="scard-sub">${mes} · Sem. ${sem}</div></div>
    <div class="scard"><div class="scard-label">Média por garçom</div><div class="scard-value" style="font-size:16px">${rows.length ? fmt(Math.round(total/rows.length)) : '—'}</div><div class="scard-sub">${rows.length} ativo(s)</div></div>
    <div class="scard"><div class="scard-label">Líder da semana</div><div class="scard-value" style="font-size:15px">${lider ? lider.garcom : '—'}</div><div class="scard-sub">${lider ? fmt(lider.val) : ''}</div></div>
    <div class="scard"><div class="scard-label">Bateram a meta</div><div class="scard-value">${bateram}/${rows.length}</div><div class="scard-sub">meta ${fmt(meta)}</div></div>
  `;
}

// ─── RENDER RANKING ─────────────────────────────────────────────────
function renderRanking(data, mes, sem) {
  const meta = parseFloat(document.getElementById('metaVal').value) || 5000;
  const dados = GARCONS.map(g => ({ garcom: g, val: getVal(data, mes, sem, g) }))
    .sort((a,b) => { if (a.val===null&&b.val===null) return 0; if (a.val===null) return 1; if (b.val===null) return -1; return b.val-a.val; });

  const emojis = ['🥇','🥈','🥉'];
  const rclass = ['r1','r2','r3'];
  const mclass = ['m1','m2','m3'];
  let rank = 0;

  document.getElementById('rankingList').innerHTML = dados.map(d => {
    const ausente = d.val === null;
    if (!ausente) rank++;
    const ri = rank - 1;
    const pct = ausente ? 0 : Math.min(100, Math.round(d.val/meta*100));
    const bateu = !ausente && d.val >= meta;
    const cardClass = ausente ? 'ausente' : (ri < 3 ? rclass[ri] : '');
    const mc = ausente ? 'mn' : (ri < 3 ? mclass[ri] : 'mn');
    const me = ausente ? '—' : (ri < 3 ? emojis[ri] : String(rank));

    return `<div class="gcard ${cardClass}">
      <div class="gcard-top">
        <div class="medal ${mc}">${me}</div>
        <div class="gcard-info">
          <div class="gcard-nome">${d.garcom}</div>
          <div class="gcard-sub">${ausente ? 'Sem registro nessa semana' : mes+' · Sem. '+sem}</div>
        </div>
        <div class="gcard-nums">
          <div class="gcard-valor">${ausente ? '—' : fmt(d.val)}</div>
          ${ausente
            ? '<span class="badge badge-aus">⚠️ Ausente</span>'
            : bateu
              ? '<span class="badge badge-ok">✅ Meta ok</span>'
              : `<span class="badge badge-no">${pct}% da meta</span>`}
        </div>
      </div>
      ${ausente ? '' : `<div class="prog-row">
        <span class="prog-label">Meta semanal</span>
        <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${CORES[d.garcom]}"></div></div>
        <span class="prog-pct">${pct}%</span>
      </div>`}
    </div>`;
  }).join('');
}

// ─── RENDER EVOLUÇÃO ────────────────────────────────────────────────
function renderEvolucao(data, mes) {
  const sems = [...new Set(data.filter(r => r.mes === mes).map(r => r.sem))].sort((a,b)=>a-b);
  const meta = parseFloat(document.getElementById('metaVal').value) || 5000;
  document.getElementById('evolTitulo').textContent = 'Evolução de vendas — ' + mes;
  document.getElementById('evolLegend').innerHTML =
    GARCONS.map(g => `<div class="legend-item"><div class="legend-dot" style="background:${CORES[g]}"></div>${g}</div>`).join('') +
    `<div class="legend-item"><div class="legend-dot" style="background:#ccc;border:1px dashed #999"></div>Meta</div>`;

  const datasets = GARCONS.map(g => ({
    label: g,
    data: sems.map(s => { const v = getVal(data, mes, s, g); return v; }),
    backgroundColor: CORES[g] + 'CC',
    borderColor: CORES[g],
    borderWidth: 1.5,
    borderRadius: 5,
    spanGaps: false,
  }));
  datasets.push({
    label: 'Meta',
    data: sems.map(() => meta),
    type: 'line',
    borderColor: '#999',
    borderDash: [5,4],
    borderWidth: 1.5,
    pointRadius: 0,
    fill: false,
  });

  if (evolChart) evolChart.destroy();
  const canvas = document.getElementById('evolChart');
  evolChart = new Chart(canvas, {
    type: 'bar',
    data: { labels: sems.map(s => 'Sem. '+s), datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ' '+ctx.dataset.label+': '+fmt(ctx.parsed.y) } }
      },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 12 } } },
        y: { grid: { color: 'rgba(128,128,128,0.1)' }, ticks: { callback: v => fmtK(v), font: { size: 11 } } }
      }
    }
  });
}

// ─── RENDER ACUMULADO ───────────────────────────────────────────────
function renderAcumulado(data) {
  const meses = getMeses();
  document.getElementById('acumConteudo').innerHTML = meses.map(mes => {
    const sems = [...new Set(data.filter(r => r.mes === mes).map(r => r.sem))];
    const totais = GARCONS.map(g => ({ garcom: g, val: sems.reduce((s,sem) => s+(getVal(data,mes,sem,g)||0), 0) }))
      .sort((a,b)=>b.val-a.val);
    return `<div class="mes-bloco">
      <div class="mes-titulo">${mes}</div>
      <div class="mes-garcons">
        ${totais.map((t,i) => `<div class="mgc">
          <div class="mgc-nome">${t.garcom}</div>
          <div class="mgc-val">${fmt(t.val)}</div>
          <div class="mgc-rank">${['🥇','🥈','🥉'][i]||''}</div>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

// ─── RENDER HISTÓRICO ───────────────────────────────────────────────
function renderHistorico(data) {
  const ativos = data.filter(r => r.val !== null).sort((a,b) => {
    const mi = r => MESES_ORDEM.indexOf(r.mes)*10+r.sem;
    return mi(b) - mi(a);
  });
  if (!ativos.length) { document.getElementById('historicoList').innerHTML = '<div class="empty"><div class="empty-icon">📋</div>Nenhum registro ainda.</div>'; return; }
  document.getElementById('historicoList').innerHTML = ativos.map((r,i) => `
    <div class="hist-item">
      <div class="hist-info">
        <span class="hist-tag">${r.mes} · Sem. ${r.sem}</span>
        <span class="hist-garcom">${r.garcom}</span>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <span class="hist-val">${fmt(r.val)}</span>
        ${modoGerente ? `<button class="btn-del" onclick="deletar('${r.mes}',${r.sem},'${r.garcom}')" title="Remover">✕</button>` : ''}
      </div>
    </div>`).join('');
}
function deletar(mes, sem, garcom) {
  if (!confirm(`Remover registro de ${garcom} — ${mes} Sem.${sem}?`)) return;
  const data = getData();
  const idx = data.findIndex(r => r.mes===mes && r.sem===sem && r.garcom===garcom);
  if (idx >= 0) { data[idx].val = null; saveData(data); renderAll(); showToast('🗑 Registro removido.'); }
}

// ─── TABS ───────────────────────────────────────────────────────────
function setTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-'+tab).classList.add('active');
  const data = getData();
  const mes = document.getElementById('selMes').value;
  if (tab==='evolucao') renderEvolucao(data, mes);
  if (tab==='acumulado') renderAcumulado(data);
  if (tab==='historico') renderHistorico(data);
}
function setTabById(tab) {
  const btn = document.querySelector(`.tab[onclick*="${tab}"]`);
  if (btn) setTab(tab, btn);
}

// ─── RENDER ALL ─────────────────────────────────────────────────────
function renderAll() {
  const data = getData();
  const mes = document.getElementById('selMes').value;
  const sem = parseInt(document.getElementById('selSem').value);
  renderSummary(data, mes, sem);
  renderRanking(data, mes, sem);
  if (currentTab==='evolucao') renderEvolucao(data, mes);
  if (currentTab==='acumulado') renderAcumulado(data);
  if (currentTab==='historico') renderHistorico(data);
}

// ─── INIT ────────────────────────────────────────────────────────────
if (!localStorage.getItem('caipira_dados')) saveData(DADOS_INICIAIS);
populateFilters();
renderAll();
</script>
